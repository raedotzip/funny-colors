name: Feature Request
description: Suggest an improvement or new feature
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Where does this belong?
      options:
        - Core library
        - Plugin system
        - Demo site
        - Multiple areas
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the gap or friction you're running into.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: example
    attributes:
      label: Example usage
      description: What would this look like in practice?
      placeholder: |
        import { funnyColors } from 'funny-colors'

        funnyColors().use(myPlugin({ /* options */ }))

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about and why you ruled them out.
