name: Bug Report (Demo Site)
description: Report a bug in the demo site or interactive builder
title: "[UI Bug]: "
labels: ["bug", "frontend", "needs-triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Click...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser + version
      placeholder: e.g. Chrome 124, Firefox 125, Safari 17

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recordings
      description: Drag and drop images or screen recordings here.
